<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Webpage Examples</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 85%;
            margin: 40px auto;
            margin-top: 10px !important;
            padding: 20px;
            padding-top: 0px !important;
            line-height: 1.6;
        }

        hr {
            width: 80%;
            color: #aaa;
            width: 2px;
        }
        
        .question,
        .music {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
            border-left: 4px solid #376d9c;
            z-index: 2;
        }
        
        button {
            width: auto;
            align-self: flex-start;
            background: #4485be;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        
        button:hover {
            background: #376d9c;
        }
        
        .content-box {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            min-height: 50px;
        }
        
        .hidden {
            display: none;
        }
        
        h2 {
            color: #333;
            margin-top: 30px;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <h1>MUSIC 100 REVIEW QUIZ</h1>
    <div class = 'content'>
        <button class="newquestion" onclick="newquestion()">Take A Question</button>
    </div>
    <script>
        document.body.musicid = [];
        document.body.incorrect = [];
        const totalQuestions = 4;
        
        //Give random question
        function mulberry32(a) {
            return function() {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            }
        }
        const rng = mulberry32(Date.now());

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];  // Swap
            }
            return array;
        }

        function revealAnswers(song, allCorrect) {
            let answerSection = document.createElement('div');
            answerSection.className = 'answer';
            answerSection.style.background = '#e3f2fd';
            answerSection.style.padding = '20px';
            answerSection.style.marginTop = '20px';
            answerSection.style.borderRadius = '0 8px 8px 0';
            answerSection.style.borderLeft = '4px solid #376d9c';

            answerSection.innerHTML = allCorrect ? 
                '<h2 style="color: #4485be;">✅ Correct!</h2>' :
                '<h2 style="color: #4485be;">❌ You Made Some Mistake!</h2>';
            
            answerSection.innerHTML += `
                <p><strong>Correct Answers:</strong></p>
                <ul>
                <li><strong>Piece:</strong> ${song.piece}</li>
                <li><strong>Author:</strong> ${song.author}</li>
                <li><strong>Era:</strong> ${song.era}</li>
                <li><strong>Genre:</strong> ${song.genre}</li>
                </ul>
            `;
            
            return answerSection;  // Return the element so caller decides where to put it
        }

        function newquestion() {
            let content = document.querySelector('.content');
            while(content.firstChild) content.firstChild.remove();
            let music_section = document.createElement('div'); music_section.className = 'music';
            let question_section = document.createElement('div'); question_section.className = 'question';
            
            // Pause old player if it exists
            if (music_section.player) {
                music_section.player.pause();
                music_section.player.currentTime = 0;
            }
        
            let musicid;
            if (document.body.musicid.length >= 20){
                showresult();
            }
            else {
                do {
                    musicid = Math.floor(rng() * 20);
                } while (document.body.musicid.includes(musicid));
                
                document.body.musicid.push(musicid);
            }

            let answeredCount = 0;
            let allCorrect = true;
            
            Promise.all([
                fetch('musics.json').then(r => r.json()),
                fetch('choices.json').then(r => r.json())
            ]).then(([musicData, choicesData]) => {
                const playlist = musicData.music_pieces;
                const choices_eras = choicesData.eras;
                const choices_authors = choicesData.authors;
                const choices_genres = choicesData.genres;

                function checkAnswered(correct) {
                    if (!correct) allCorrect = false;
                    answeredCount++;
                    if (answeredCount === totalQuestions) {
                        if (!allCorrect) document.body.incorrect.push(musicid);
                        
                        // Use the reusable function
                        let answer = revealAnswers(playlist[musicid], allCorrect);
                        content.appendChild(answer);
                        
                        let hr = document.createElement('hr');
                        content.appendChild(hr);
                        
                        let nextBtn = document.createElement('button');
                        nextBtn.textContent = `Take Another One (${document.body.musicid.length}/20)`;
                        nextBtn.addEventListener('click', () => newquestion());
                        content.appendChild(nextBtn);
                    }
                }
                
            //------------------------------------------------------Music Player Section
                // Add heading ONCE at the beginning
                let heading = document.createElement('h1');
                heading.textContent = 'Listen to this:';
                music_section.appendChild(heading);
                
                // Create and save player
                let player = document.createElement('audio');
                player.id = 'player';
                player.src = playlist[musicid].link;
                music_section.player = player;
                music_section.appendChild(player);
                
                let playBtn = document.createElement('button');
                playBtn.textContent = '▶ Play';
                playBtn.addEventListener('click', () => {
                    player.play();
                });
                music_section.appendChild(playBtn);
                
                let pauseBtn = document.createElement('button');
                pauseBtn.textContent = '⏸ Pause';
                pauseBtn.addEventListener('click', () => {
                    player.pause();
                });
                music_section.appendChild(pauseBtn);

            //------------------------------------------------------Question Section
                let heading_q = document.createElement('h1');
                heading_q.textContent = 'Answer these:';
                question_section.appendChild(heading_q);

                // Name question
                let name_question = document.createElement('div');
                name_question.innerHTML = "<h2>Piece Name: </h2>";
                name_question.style.display = 'flex';
                name_question.style.flexDirection = 'column';
                let name_buttonlist = [];

                let name_choices = [playlist[musicid].piece];
                while (name_choices.length <= 5) {
                    let randomIndex = Math.floor(rng() * playlist.length);
                    let randomPiece = playlist[randomIndex].piece;
                    if (!name_choices.includes(randomPiece)) {
                        name_choices.push(randomPiece);
                    }
                }

                for (let choice of name_choices) {
                    let choicebtn = document.createElement('button');
                    choicebtn.textContent = choice;
                    choicebtn.dataset.answer = playlist[musicid].piece;
                    choicebtn.addEventListener('click', () => {
                        if (choicebtn.clicked) return;   
                        name_buttonlist.forEach(btn => btn.clicked = true);
                        if (!choicebtn.dataset.answer.includes(choicebtn.textContent)) {
                            choicebtn.style.background = '#b85555';
                            checkAnswered(false);
                        } else {
                            choicebtn.style.background = '#6aad5a';
                            checkAnswered(true);
                        }
                    });
                    name_buttonlist.push(choicebtn);
                }
                name_buttonlist = shuffle(name_buttonlist);
                for (let button of name_buttonlist) {
                    name_question.appendChild(button);
                }
                question_section.appendChild(name_question);
                
                // Author question
                let author_question = document.createElement('div');
                author_question.innerHTML = "<h2>Author: </h2>";
                let author_buttonlist = [];
                for (let choice of choices_authors) {
                    let choicebtn = document.createElement('button');
                    choicebtn.textContent = choice;
                    choicebtn.dataset.answer = playlist[musicid].author;
                    choicebtn.addEventListener('click', () => {
                        if (choicebtn.clicked) return;   
                        author_buttonlist.forEach(btn => btn.clicked = true);
                        if (!choicebtn.dataset.answer.includes(choicebtn.textContent)) {
                            choicebtn.style.background = '#b85555';
                            checkAnswered(false);
                        } else {
                            choicebtn.style.background = '#6aad5a';
                            checkAnswered(true);
                        }
                    });
                    author_buttonlist.push(choicebtn);
                }
                author_buttonlist = shuffle(author_buttonlist);
                for (let button of author_buttonlist) {
                    author_question.appendChild(button);
                }
                question_section.appendChild(author_question);

                // Era question (no shuffle)
                let era_question = document.createElement('div');
                era_question.innerHTML = "<h2>Era: </h2>";
                let era_buttonlist = [];
                for (let choice of choices_eras) {
                    let choicebtn = document.createElement('button');
                    choicebtn.textContent = choice;
                    choicebtn.dataset.answer = playlist[musicid].era;
                    choicebtn.addEventListener('click', () => {
                        if (choicebtn.clicked) return;   
                        era_buttonlist.forEach(btn => btn.clicked = true);
                        if (!choicebtn.dataset.answer.includes(choicebtn.textContent)) {
                            choicebtn.style.background = '#b85555';
                            checkAnswered(false);
                        } else {
                            choicebtn.style.background = '#6aad5a';
                            checkAnswered(true);
                        }
                    });
                    era_buttonlist.push(choicebtn);
                }
                for (let button of era_buttonlist) {
                    era_question.appendChild(button);
                }
                question_section.appendChild(era_question);

                // Genre question
                let genre_question = document.createElement('div');
                genre_question.innerHTML = "<h2>Genre: </h2>";
                let genre_buttonlist = [];
                for (let choice of choices_genres) {
                    let choicebtn = document.createElement('button');
                    choicebtn.textContent = choice;
                    choicebtn.dataset.answer = playlist[musicid].genre;
                    choicebtn.addEventListener('click', () => {
                        if (choicebtn.clicked) return;   
                        genre_buttonlist.forEach(btn => btn.clicked = true);
                        if (!choicebtn.dataset.answer.includes(choicebtn.textContent)) {
                            choicebtn.style.background = '#b85555';
                            checkAnswered(false);
                        } else {
                            choicebtn.style.background = '#6aad5a';
                            checkAnswered(true);
                        }
                    });
                    genre_buttonlist.push(choicebtn);
                }
                genre_buttonlist = shuffle(genre_buttonlist);
                for (let button of genre_buttonlist) {
                    genre_question.appendChild(button);
                }
                question_section.appendChild(genre_question);

                content.appendChild(music_section);
                content.appendChild(question_section);
            });
        }

        function showresult() {
            while(document.body.firstChild) document.body.firstChild.remove();
            
            fetch('musics.json')
                .then(response => response.json())
                .then(data => {
                    const playlist = data.music_pieces;
                    
                    let heading = document.createElement('h1');
                    heading.textContent = '🎵 Quiz Complete!';
                    document.body.appendChild(heading);

                    let summary = document.createElement('div');
                    summary.style.background = '#e3f2fd';
                    summary.style.padding = '20px';
                    summary.style.borderRadius = '8px';
                    summary.innerHTML = `<h2>Score: ${20 - document.body.incorrect.length} / 20</h2>`;
                    document.body.appendChild(summary);

                    if (document.body.incorrect.length > 0) {
                        let mistakeHeading = document.createElement('h2');
                        mistakeHeading.textContent = '❌ Questions You Got Wrong:';
                        document.body.appendChild(mistakeHeading);

                        for (let id of document.body.incorrect) {
                            // Reuse the same function!
                            let answer = revealAnswers(playlist[id], false);
                            document.body.appendChild(answer);
                        }
                    } else {
                        let perfect = document.createElement('h2');
                        perfect.textContent = '🎉 Perfect Score!';
                        perfect.style.color = '#28a745';
                        document.body.appendChild(perfect);
                    }

                    let restartBtn = document.createElement('button');
                    restartBtn.textContent = '🔄 Restart Quiz';
                    restartBtn.addEventListener('click', () => {
                        location.reload();
                    });
                    document.body.appendChild(restartBtn);
                });
        }
    </script>
</body>
</html>
